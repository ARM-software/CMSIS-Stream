version: 3.0.0
schedule-options:
  memory-optimization: true
  mem-strategy: independent_set
  buffer-allocation: true
code-generation-options:
  debug-limit: 1
  fifo-prefix: cv
c-code-generation-options:
  c-optional-init-args:
  - uint8_t *myBuffer
  - uint8_t *myBufferB
  c-optional-execution-args:
  - uint8_t *myBuffer
  - uint8_t *myBufferB
  scheduler-c-file-name: cv_scheduler1

