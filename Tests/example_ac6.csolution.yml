solution:
  created-for: CMSIS-Toolbox@2.13.0
  language-C: c11
  language-CPP: c++17
  cdefault: # use CMSIS-Toolbox default Compiler options

  compiler: AC6
  misc:
    - C:
        - -Wsign-compare
        - -Wdouble-promotion
        - -DNDEBUG
        - -Wall
        - -Wextra
        - -Werror
        - -std=c11
        - -Ofast
        - -ffast-math
        - -Wno-packed
        - -Wno-missing-variable-declarations
        - -Wno-missing-prototypes
        - -Wno-missing-noreturn
        - -Wno-sign-conversion
        - -Wno-nonportable-include-path
        - -Wno-reserved-id-macro
        - -Wno-unused-macros
        - -Wno-documentation-unknown-command
        - -Wno-documentation
        - -Wno-license-management
        - -Wno-parentheses-equality
        - -Wno-reserved-identifier
    - CPP:
        - -fno-rtti
        - -DNDEBUG
        - -Wall
        - -Wextra
        - -std=c++11
        - -Ofast
        - -ffast-math
    - ASM:
        - -masm=auto
    - Link:
        - --entry=Reset_Handler
        - --info=summarysizes
        - --info=sizes
        - --info=totals
        - --info=unused
        - --info=veneers

  packs:
    - pack: ARM::CMSIS@6.0.0
    - pack: ARM::V2M_MPS3_SSE_300_BSP@1.5.0
    - pack: ARM::CMSIS-Compiler@2.0.0
    - pack: ARM::Cortex_DFP@1.0.0
    - pack: ARM::CMSIS-DSP@^1.17.0
    - pack: ARM::CMSIS-RTX@^5.9.0

  target-types:
    - type: VHT-Corstone-300
      device: ARM::SSE-300-MPS3
      target-set:
        - set:
          images:
            - project-context: duplicate.CommandLine

  build-types:
    - type: CommandLine
      debug: off
      define:
        - COMMAND_LINE

    - type: IDE
      debug: off

  projects:
    - project: ./sync/syncgraph.cproject.yml
    - project: ./async/asyncgraph.cproject.yml
    - project: ./fifobench_sync/fifobench_sync.cproject.yml
    - project: ./fifobench_async/fifobench_async.cproject.yml
    - project: ./fifo/fifo.cproject.yml
    - project: ./duplicate_sync/duplicate.cproject.yml
